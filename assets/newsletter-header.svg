<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="#0A1628"/>

  <!-- Decorative grid pattern (subtle) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2940" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- Left accent line -->
  <rect x="40" y="80" width="4" height="140" fill="#C5A44E"/>

  <!-- Main title -->
  <text x="70" y="140" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="2">
    GOVCON WEEKLY
  </text>
  <text x="70" y="190" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" fill="#C5A44E" letter-spacing="2">
    INTELLIGENCE
  </text>

  <!-- Subtitle -->
  <text x="70" y="235" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#8899AA" letter-spacing="1">
    Week of March 18, 2026
  </text>

  <!-- Right accent element - geometric -->
  <g opacity="0.6">
    <polygon points="1050,100 1080,130 1050,160 1020,130" fill="none" stroke="#C5A44E" stroke-width="2"/>
    <polygon points="1090,100 1120,130 1090,160 1060,130" fill="none" stroke="#C5A44E" stroke-width="2"/>
    <polygon points="1130,100 1160,130 1130,160 1100,130" fill="none" stroke="#C5A44E" stroke-width="2"/>
  </g>

  <!-- Bottom accent line -->
  <line x1="70" y1="270" x2="1130" y2="270" stroke="#C5A44E" stroke-width="1" opacity="0.4"/>
</svg>
