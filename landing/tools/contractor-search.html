<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Federal Contractor Search - Recent Awards | GovCon Intel</title>
    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);

            min-height: 100vh;
            padding: 20px;
        }

            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #FFD700;
        }

        .subtitle {
            font-size: 1.1em;
            color: #ccc;
            margin-bottom: 30px;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #FFD700;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.95);
            color: #001f3f;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #FFA500;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .search-input::placeholder {
            color: #666;
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .contractor-card {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #FFD700;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .contractor-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
        }

        .contractor-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 215, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .stat-label {
            color: #FFD700;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
        }

        .top-agencies {
            margin-bottom: 20px;
        }

        .agency-label {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .agency-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .agency-tag {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #001f3f;
            padding: 12px 25px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #ccc;
            font-size: 1.1em;
            display: none;
        }

        .no-results.active {
            display: block;
        }

        .popular-contractors {
            text-align: center;
            margin-top: 20px;
            color: #ccc;
            font-size: 0.95em;
        }

        .popular-contractors span {
            color: #FFD700;
            cursor: pointer;
            text-decoration: underline;
            margin: 0 8px;
            font-size: 0.9em;

        }

            text-align: center;
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);

            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-left: 10px;
            font-weight: normal;

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const noResultsDiv = document.getElementById('noResults');

        function searchContractor(query) {
            if (!query || query.trim().length < 2) {
                resultsDiv.classList.remove('active');
                noResultsDiv.classList.remove('active');
                return;
            }

            const searchTerm = query.toLowerCase().trim();
            const matches = contractorData.filter(contractor =>
                contractor.name.toLowerCase().includes(searchTerm)
            );

            displayResults(matches);
        }

        function displayResults(matches) {
            if (matches.length === 0) {
                resultsDiv.classList.remove('active');
                noResultsDiv.classList.add('active');
                return;
            }

            noResultsDiv.classList.remove('active');
            resultsDiv.classList.add('active');

            const html = matches.map(contractor => {
                const avgAwardValue = contractor.total / contractor.count;
                const uniqueAgencies = [...new Set(contractor.agencies)];

                return `
                    <div class="contractor-card">
                        <div class="contractor-name">
                            ${contractor.name}
                            <span class="rank-badge">Rank #${contractor.rank}</span>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="stat-label">Total Awards</div>
                                <div class="stat-value">${contractor.count}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Total Value</div>
                                <div class="stat-value">$${formatCurrency(contractor.total)}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Avg Award Value</div>
                                <div class="stat-value">$${formatCurrency(avgAwardValue)}</div>
                            </div>
                        </div>
                        <div class="top-agencies">
                            <div class="agency-label">Active Agencies:</div>
                            <div class="agency-list">
                                ${uniqueAgencies.map(agency =>
                                    `<span class="agency-tag">${shortenAgency(agency)}</span>`
                                ).join('')}
                            </div>
                        </div>
                        <a href="#subscribe" class="cta-button">
                            Get ${contractor.name.split(',')[0]} Activity Alerts Weekly →
                        </a>
                    </div>
                `;
            }).join('');

            resultsDiv.innerHTML = html;
        }

        function formatCurrency(amount) {
            if (amount >= 1000000000) {
                return (amount / 1000000000).toFixed(2) + 'B';
            } else if (amount >= 1000000) {
                return (amount / 1000000).toFixed(1) + 'M';
            } else if (amount >= 1000) {
                return (amount / 1000).toFixed(0) + 'K';
            }
            return amount.toFixed(2);
        }

        function shortenAgency(agency) {
            const abbreviations = {
                "Department of Defense": "DoD",
                "Department of Energy": "DOE",
                "Department of Veterans Affairs": "VA",
                "Department of Health and Human Services": "HHS",
                "Department of Homeland Security": "DHS",
                "Department of Justice": "DOJ",
                "Department of State": "State",
                "Department of Transportation": "DOT",
                "Department of Education": "Education",
                "Department of Labor": "Labor",
                "General Services Administration": "GSA",
                "National Aeronautics and Space Administration": "NASA"
            };
            return abbreviations[agency] || agency;
        }

        function searchExample(term) {
            searchInput.value = term;
            searchContractor(term);
        }

        // Event listeners
        searchInput.addEventListener('input', (e) => {
            searchContractor(e.target.value);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchContractor(e.target.value);
            }
        });

        // Auto-focus search input
        searchInput.focus();
